    <!-- One-time SW + cache nuke: recovers users with a stuck service worker
         from the T27 precompile cycle. Runs before any CDN script so those
         are fetched fresh from network, not from stale SW cache. -->
    <script>
    (function(){
      try {
        var flag = 'charlie_sw_nuked_v1';
        if (!localStorage.getItem(flag)) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs){
              regs.forEach(function(r){ r.unregister(); });
            }).catch(function(){});
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function(ns){
              ns.forEach(function(n){ caches.delete(n); });
            }).catch(function(){});
          }
          localStorage.setItem(flag, '1');
          setTimeout(function(){ location.reload(); }, 400);
        }
      } catch(e) { /* ignore */ }
    })();
    </script>

    <!-- Service Worker Registration -->
    <script>
        // Register service worker for PWA functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js', { updateViaCache: 'none' })
                    .then(registration => {
                        console.log('✅ ServiceWorker registered:', registration.scope);

                        // Force check for updates on every launch (iOS PWAs don't auto-check)
                        registration.update();

                        // Also check periodically (every 5 minutes while app is open)
                        setInterval(() => registration.update(), 5 * 60 * 1000);

                        // When a new SW is found, auto-activate and reload
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Skip waiting and reload immediately
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                }
                            });
                        });
                    })
                    .catch(err => {
                        console.log('❌ ServiceWorker registration failed:', err);
                    });
            });

            // Also reload when a new SW takes control (handles edge cases)
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }

        // Install prompt for iOS
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install button (optional - you can add a button in UI later)
            console.log('💡 App can be installed');
        });

        // Track if app was installed
        window.addEventListener('appinstalled', () => {
            console.log('✅ App installed successfully');
            deferredPrompt = null;
        });

        // Detect if running as PWA
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            console.log('📱 Running as PWA');
            document.body.classList.add('pwa-mode');
        }
    </script>
